  { min:25, max:49, name:"Gull-Elite",     color:"#D4AF37", icon:"🥇", nextName:"Kulinarisk VIP",  nextAt:50 },
  { min:50, max:Infinity, name:"Kulinarisk VIP", color:"#FFD700", icon:"👑", nextName:null, nextAt:null },
];
const getLeague = count => LEAGUES.find(l => count >= l.min && count <= l.max) || LEAGUES[0];
const getLeagueProgress = count => {
  const l = getLeague(count);
  if (!l.nextAt) return 100;
  return Math.min(((count - l.min) / (l.nextAt - l.min)) * 100, 100);
};
const getMotivationText = count => {
  const l = getLeague(count);
  if (!l.nextAt) return 'Gullstatus oppnådd. Du sitter på The Chef\'s Table. ✨';
  const rem = l.nextAt - count;
  const verb = l.min === 0 ? 'rykke opp til' : l.min === 3 ? 'nå' : l.min === 10 ? 'nå den eksklusive' : 'oppnå den ultimate';
  return `📸 Ta bilde av ${rem} rett${rem !== 1 ? 'er' : ''} til for å ${verb} ${l.nextName}!`;
};

const resizeImage = (dataUrl, maxPx = 1280) => new Promise(resolve => {
  const img = new Image();
  img.onload = () => {
    let { width: w, height: h } = img;
    if (w > maxPx || h > maxPx) {
      if (w >= h) { h = Math.round(h * maxPx / w); w = maxPx; }
      else        { w = Math.round(w * maxPx / h); h = maxPx; }
    }
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    c.getContext('2d').drawImage(img, 0, 0, w, h);
    resolve(c.toDataURL('image/jpeg', 0.82));
  };
  img.src = dataUrl;
});

const analyzeImage = async (base64, mime) => {
  const res = await fetch('/api/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ base64, mime })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    if (res.status === 429) throw new Error('For mange forespørsler – vent litt og prøv igjen');
    if (res.status === 503) throw new Error('AI-tjenesten er ikke tilgjengelig akkurat nå');
    throw new Error(err.error || `Feil (${res.status})`);
  }

  return await res.json();
};

                Ingen lagrede retter ennå.<br/>
                <span style={{ color:"#D4AF37" }}>Bokmerke favorittene dine!</span>
              </p>
            </div>
          ) : (
            savedDishes.map(d => (
              <div key={d.id} style={{
                display:"flex", alignItems:"center", gap:13,
                padding:"12px 0", borderBottom:"1px solid rgba(255,255,255,0.05)"
              }}>
                <div style={{ width:60, height:60, flexShrink:0, borderRadius:10, overflow:"hidden", border:"1px solid rgba(212,175,55,0.2)" }}>
                  <img src={d.thumb} alt={d.name} style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
                </div>
                <div style={{ flex:1 }}>
                  <p style={{ color:"#fff", fontSize:14, fontWeight:600, margin:"0 0 3px" }}>{d.name}</p>
                  <p style={{ color:"#888", fontSize:12, margin:"0 0 3px" }}>{d.restaurantName}</p>
                  <p style={{ color:"#D4AF37", fontSize:12, fontWeight:700, margin:0 }}>{d.price}</p>
                </div>
              </div>
            ))
          )
        )}
      </div>
    </div>
  );
};

/* ═══════════════════════════ COUPON MODAL ═══════════════════════════ */

  const [showConfirm, setShowConfirm] = useState(false);

  return (
    <div className="anim-fade-in" style={{
      position:"fixed", inset:0, zIndex:300,
      background:"rgba(0,0,0,0.9)",
      display:"flex", alignItems:"center", justifyContent:"center",
      padding:"24px", overflowY:"auto", WebkitOverflowScrolling:"touch"
    }}>
      <div className="anim-scale-pop" style={{
        width:"100%", maxWidth:380,
        background:"#141414", borderRadius:20,
        border:"1px solid #D4AF37",
        boxShadow:"0 0 70px rgba(212,175,55,0.25), inset 0 0 40px rgba(212,175,55,0.02)",
        overflow:"hidden", maxHeight:"90vh", overflowY:"auto"

        <div style={{ height:4, background:"linear-gradient(90deg,#9A7D22,#F0D060,#D4AF37,#9A7D22)" }} />

            <div style={{ display:"flex", justifyContent:"center", gap:6, marginTop:8 }}>
              {["✦","✦","✦"].map((s,i) => <span key={i} style={{ color:"#D4AF37", fontSize:11 }}>{s}</span>)}
            </div>
          </div>

          <h2 className="gold-text-gradient" style={{
            fontSize:22, fontWeight:900, textAlign:"center",
            letterSpacing:"0.08em", margin:"0 0 8px", textTransform:"uppercase"
          }}>
            Gullstatus oppnådd!
          </h2>
          <p style={{ color:"#777", fontSize:12, textAlign:"center", margin:"0 0 20px", lineHeight:1.6 }}>
            Du var den første til å dokumentere<br />
            <span style={{ color:"#fff", fontWeight:600 }}>"{dish?.name}"</span>
          </p>

          <div style={{ margin:"0 auto 20px", width:"75%", height:1, background:"linear-gradient(90deg,transparent,#D4AF37,transparent)", opacity:0.45 }} />

          <div style={{
            background:"rgba(212,175,55,0.06)", border:"1px dashed rgba(212,175,55,0.4)",
            borderRadius:14, padding:"16px", marginBottom:20, textAlign:"center"
          }}>
            <p style={{ color:"#666", fontSize:11, letterSpacing:"0.12em", textTransform:"uppercase", margin:"0 0 8px" }}>Din fordel</p>
            <p style={{ color:"#fff", fontSize:15, fontWeight:600, lineHeight:1.55, margin:0 }}>
              Vis denne skjermen i baren for en<br />
              <span style={{ color:"#D4AF37", fontWeight:800 }}>gratis valgfri mineralvann eller brus</span><br />
              fra restauranten.
            </p>
          </div>

          <div style={{
            display:"flex", alignItems:"center", justifyContent:"center", gap:8,
            background:"rgba(212,175,55,0.07)", borderRadius:10, padding:"10px 16px",
            marginBottom:24, border:"1px solid rgba(212,175,55,0.12)"
          }}>
            <span style={{ color:"#D4AF37", fontSize:16 }}>✦</span>
            <span style={{ color:"#D4AF37", fontSize:13, fontWeight:700 }}>+100 poeng etter bruk</span>
            <span style={{ color:"#333", fontSize:12 }}>·</span>
            <span style={{ color:"#666", fontSize:12 }}>Totalt: {points + 100}</span>
          </div>

          {!showConfirm ? (
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              <button onClick={() => setShowConfirm(true)} className="anim-pulse-gold" style={{
                width:"100%", padding:"15px",
                background:"#D4AF37", border:"none", borderRadius:13, cursor:"pointer",
                fontSize:14, fontWeight:800, color:"#0D0D0D", letterSpacing:"0.05em"
              }}>
                Bruk kupong

              <button onClick={onClose} style={{
                width:"100%", padding:"12px",
                background:"transparent", border:"1px solid #2a2a2a", borderRadius:13, cursor:"pointer",
                fontSize:13, color:"#555"
              }}>

              </button>

          ) : (
            <div style={{
              background:"rgba(212,175,55,0.07)", border:"1px solid rgba(212,175,55,0.25)",
              borderRadius:14, padding:"16px"
            }}>
              <p style={{ color:"#fff", fontSize:14, textAlign:"center", margin:"0 0 8px", fontWeight:700 }}>
                Er du sikker?
              </p>
              <p style={{ color:"#666", fontSize:12, textAlign:"center", margin:"0 0 16px", lineHeight:1.55 }}>

                Kupongen kan kun brukes én gang.
              </p>

                <button onClick={() => setShowConfirm(false)} style={{

/* ═══════════════════════════ POINTS TOAST ═══════════════════════════ */

const PointsToast = ({ points, visible }) => (
  <div style={{
    position:"fixed", top:20, left:"50%", transform:"translateX(-50%)",
    zIndex:600,
    background:"#1A1A1A", border:"1px solid #D4AF37",
    borderRadius:30, padding:"10px 20px",
    display:"flex", alignItems:"center", gap:8,
    opacity: visible ? 1 : 0,
    transition:"opacity 0.4s ease",
    pointerEvents:"none",
    boxShadow:"0 4px 30px rgba(212,175,55,0.3)"
  }}>
    <span style={{ color:"#D4AF37", fontSize:15 }}>✦</span>
    <span style={{ color:"#fff", fontSize:13, fontWeight:700 }}>+100 poeng opptjent!</span>
    <span style={{ color:"#666", fontSize:12 }}>Totalt: {points}</span>
  </div>
);

/* ═══════════════════════════ APP ═══════════════════════════ */

const App = () => {
  const [navTab,             setNavTab]             = useState('explore');
  const [profileTab,         setProfileTab]         = useState('coupons');
  const [screen,             setScreen]             = useState('discover');
  const [selectedRestaurant, setSelectedRestaurant] = useState(null);
  const [selectedDish,       setSelectedDish]       = useState(null);
  const [uploadedDishes,     setUploadedDishes]     = useState(new Set());
  const [bookmarkedDishes,   setBookmarkedDishes]   = useState(new Set());
  const [coupons,            setCoupons]            = useState([
    { id:1, dishName:"Østers naturell", restaurantName:"Køl Bar & Bistro", used:false }
  ]);
  const [showCoupon,         setShowCoupon]         = useState(false);
  const [totalPoints,        setTotalPoints]        = useState(0);
  const [showToast,          setShowToast]          = useState(false);

  const [capturedImage,  setCapturedImage]  = useState(null);
  const [showImageModal, setShowImageModal] = useState(false);

  const fileInputRef = useRef(null);

  const openFilePicker = () => {
    if (fileInputRef.current) {
      fileInputRef.current.value = '';
      fileInputRef.current.click();
    }
  };

  // Restaurants with uploaded state merged in
  const restaurantsWithState = RESTAURANTS.map(r => ({
    ...r,
    menu: Object.fromEntries(
      Object.entries(r.menu).map(([cat, dishes]) => [
        cat,
        dishes.map(d => ({ ...d, uploaded: uploadedDishes.has(d.id) }))
      ])
    )
  }));

  const currentRestaurant = selectedRestaurant
    ? restaurantsWithState.find(r => r.id === selectedRestaurant.id)
    : null;

  /* ── Handlers ── */

  const handleSelectRestaurant = r => { setSelectedRestaurant(r); setScreen('restaurant'); };

  const handleBack = () => {
    setScreen('discover');
    setSelectedDish(null);
    setShowCoupon(false);
    setShowImageModal(false);
    setCapturedImage(null);
  };

  const handleSelectDish = dish => {
    const enriched = { ...dish, uploaded: uploadedDishes.has(dish.id) };
    setSelectedDish(enriched);
  };

  const handleCloseDish = () => setSelectedDish(null);

  const handleUploadClick = () => openFilePicker();

  const handleFileSelected = async e => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async ev => {
      const resized = await resizeImage(ev.target.result);
      const [, base64] = resized.split(',');
      setCapturedImage({ preview: resized, base64, mime: 'image/jpeg' });
      setShowImageModal(true);
    };
    reader.readAsDataURL(file);
  };

  const handleRetake = () => {
    setShowImageModal(false);
    setCapturedImage(null);
    setTimeout(openFilePicker, 120);
  };

  const handleApproved = () => {
    setShowImageModal(false);
    setCapturedImage(null);
    if (selectedDish) {
      setUploadedDishes(prev => new Set([...prev, selectedDish.id]));
      setSelectedDish(prev => ({ ...prev, uploaded: true }));
      setCoupons(prev => [...prev, {
        id: Date.now(),
        dishName: selectedDish.name,
        restaurantName: selectedRestaurant?.name,
        used: false
      }]);
    }
    setTimeout(() => setShowCoupon(true), 350);
  };

  const handleUseCouponFromProfile = couponId => {
    setCoupons(prev => prev.map(c => c.id === couponId ? { ...c, used:true } : c));
    setTotalPoints(p => p + 100);
    setShowToast(true);
    setTimeout(() => setShowToast(false), 3200);
  };

  const handleCloseImageModal = () => {
    setShowImageModal(false);
    setCapturedImage(null);
  };

  const handleUseCoupon = () => {
    setShowCoupon(false);
    setCoupons(prev => {
      const idx = prev.map(c=>c.used).lastIndexOf(false);
      return prev.map((c,i) => i===idx ? {...c,used:true} : c);
    });
    setSelectedDish(null);
    setTotalPoints(p => p + 100);
    setShowToast(true);
    setTimeout(() => setShowToast(false), 3200);
  };

  const handleCloseCoupon = () => {
    setShowCoupon(false);
    setSelectedDish(null);
  };

  // Flatten bookmarked dishes across all restaurants for profile
  const savedDishes = [];
  restaurantsWithState.forEach(r => {
    Object.values(r.menu).forEach(dishes => {
      dishes.forEach(d => {
        if (bookmarkedDishes.has(d.id)) savedDishes.push({ ...d, restaurantName: r.name });
      });
    });
  });

  const showNavBar = !showImageModal && !showCoupon;

  return (
    <div style={{ background:"#0D0D0D", minHeight:"100vh", maxWidth:430, margin:"0 auto", position:"relative", overflow:"hidden" }}>

      {/* Hidden file input */}
      <input
        type="file"
        ref={fileInputRef}
        accept="image/*"
        style={{ display:"none" }}
        onChange={handleFileSelected}
      />

      {/* Points badge — above navbar */}
      {totalPoints > 0 && !showImageModal && navTab === 'explore' && (
        <div style={{
          position:"fixed", bottom:80, right:16, zIndex:90,
          background:"rgba(212,175,55,0.12)", border:"1px solid rgba(212,175,55,0.35)",
          borderRadius:20, padding:"6px 13px",
          display:"flex", alignItems:"center", gap:5,
          pointerEvents:"none"
        }}>
          <span style={{ color:"#D4AF37", fontSize:12 }}>✦</span>
          <span style={{ color:"#D4AF37", fontSize:12, fontWeight:700 }}>{totalPoints} poeng</span>
        </div>
      )}

      {/* Explore tab */}
      {navTab === 'explore' && (
        <>
          {screen === 'discover' && (
            <DiscoverScreen
              restaurants={restaurantsWithState}
              onSelect={handleSelectRestaurant}
            />
          )}
          {screen === 'restaurant' && currentRestaurant && !showImageModal && (
            <RestaurantScreen
              restaurant={currentRestaurant}
              onBack={handleBack}
              onSelectDish={handleSelectDish}
            />
          )}
        </>
      )}

      {/* Profile tab */}
      {navTab === 'profile' && (
        <ProfileScreen
          uploadCount={uploadedDishes.size + 1}
          coupons={coupons}
          onUseCoupon={handleUseCouponFromProfile}
          savedDishes={savedDishes}
          profileTab={profileTab}
          setProfileTab={setProfileTab}
        />
      )}

      {/* Dish modal — shown on top of any tab */}
      {selectedDish && !showCoupon && !showImageModal && (
        <DishModal
          dish={selectedDish}
          restaurantName={selectedRestaurant?.name}
          onClose={handleCloseDish}
          onUploadClick={handleUploadClick}
        />
      )}

      {/* Image upload + AI validation modal */}
      {showImageModal && capturedImage && (
        <ImageUploadModal
          dish={selectedDish}
          restaurantName={selectedRestaurant?.name}
          imageData={capturedImage}
          onRetake={handleRetake}
          onApproved={handleApproved}
          onClose={handleCloseImageModal}
        />
      )}

      {/* Gold coupon */}
      {showCoupon && selectedDish && (
        <CouponModal
          dish={selectedDish}
          points={totalPoints}
          onUse={handleUseCoupon}
          onClose={handleCloseCoupon}
        />
      )}

      {/* Bottom nav */}
      {showNavBar && (
        <BottomNav activeTab={navTab} onTabChange={setNavTab} />
      )}

      {/* Points toast */}
      <PointsToast points={totalPoints} visible={showToast} />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
