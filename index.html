/* ═══════════════════════════ DISTANCE ═══════════════════════════ */

const haversine = (lat1, lon1, lat2, lon2) => {
  const R = 6371000;
  const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
  const Δφ = (lat2 - lat1) * Math.PI / 180;
  const Δλ = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
};

const formatDist = (meters, lang = 'no') => {
  if (meters < 1000) {
    const m = Math.round(meters / 10) * 10 || 10;
    return lang === 'en' ? `${m}m away` : `${m}m unna`;
  }
  const km = (meters / 1000).toFixed(1);
  return lang === 'en' ? `${km}km away` : `${km}km unna`;
};

const LEAGUES = [
  { min:0,  max:2,  name:"Mat-Aspirant",   color:"#aaaaaa", icon:"🍽️", nextName:"Bronse-Gourmet", nextAt:3  },
  { min:3,  max:9,  name:"Bronse-Gourmet", color:"#CD7F32", icon:"🥉", nextName:"Sølv-Kritiker",  nextAt:10 },
  { min:10, max:24, name:"Sølv-Kritiker",  color:"#C0C0C0", icon:"🥈", nextName:"Gull-Elite",      nextAt:25 },
  { min:25, max:49, name:"Gull-Elite",     color:"#D4AF37", icon:"🥇", nextName:"Kulinarisk VIP",  nextAt:50 },
  { min:50, max:Infinity, name:"Kulinarisk VIP", color:"#FFD700", icon:"👑", nextName:null, nextAt:null },
];
const getLeague = count => LEAGUES.find(l => count >= l.min && count <= l.max) || LEAGUES[0];
const getLeagueProgress = count => {
  const l = getLeague(count);
  if (!l.nextAt) return 100;
  return Math.min(((count - l.min) / (l.nextAt - l.min)) * 100, 100);
};
const getMotivationText = (count, t) => {
  const l = getLeague(count);
  if (!l.nextAt) return t('mot_vip');
  const rem = l.nextAt - count;
  const ldict = t('leagues') || {};
  const nextDisplay = ldict[l.nextName] || l.nextName;
  return t('mot_rem')(rem, nextDisplay);
};

const resizeImage = (dataUrl, maxPx = 1280) => new Promise(resolve => {
  const img = new Image();
  img.onload = () => {
    let { width: w, height: h } = img;
    if (w > maxPx || h > maxPx) {
      if (w >= h) { h = Math.round(h * maxPx / w); w = maxPx; }
      else        { w = Math.round(w * maxPx / h); h = maxPx; }
    }
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    c.getContext('2d').drawImage(img, 0, 0, w, h);
    resolve(c.toDataURL('image/jpeg', 0.82));
  };
  img.src = dataUrl;
});

const analyzeImage = async (base64, mime, t) => {
  const res = await fetch('/api/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ base64, mime })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    if (res.status === 429) throw new Error(t('err_too_many'));
    if (res.status === 503) throw new Error(t('err_unavailable'));
    throw new Error(err.error || t('err_generic')(res.status));
  }

  return await res.json();
};

                  fontSize:13, fontWeight:800, color:"#0D0D0D"
                }}>
                  {t('coupon_confirm_btn')}
                </button>
              </div>
            </div>
          )}
        </div>
        <div style={{ height:4, background:"linear-gradient(90deg,#9A7D22,#F0D060,#D4AF37,#9A7D22)" }} />
      </div>
    </div>
  );
};

/* ═══════════════════════════ POINTS TOAST ═══════════════════════════ */

const PointsToast = ({ points, visible }) => {
  const { lang } = useLang();
  const t = key => TRANSLATIONS[lang]?.[key] ?? TRANSLATIONS.no[key];
  return (
  <div style={{
    position:"fixed", top:20, left:"50%", transform:"translateX(-50%)",
    zIndex:600,
    background:"#1A1A1A", border:"1px solid #D4AF37",
    borderRadius:30, padding:"10px 20px",
    display:"flex", alignItems:"center", gap:8,
    opacity: visible ? 1 : 0,
    transition:"opacity 0.4s ease",
    pointerEvents:"none",
    boxShadow:"0 4px 30px rgba(212,175,55,0.3)"
  }}>
    <span style={{ color:"#D4AF37", fontSize:15 }}>✦</span>
    <span style={{ color:"#fff", fontSize:13, fontWeight:700 }}>{t('toast_earned')}</span>
    <span style={{ color:"#666", fontSize:12 }}>{t('toast_total')(points)}</span>
  </div>
  );
};

/* ═══════════════════════════ ONBOARDING ═══════════════════════════ */

const OnboardingScreen = ({ onComplete }) => {
  const { lang } = useLang();
  const t = key => TRANSLATIONS[lang]?.[key] ?? TRANSLATIONS.no[key];
  const [step,   setStep]   = useState(1);
  const [navn,   setNavn]   = useState('');
  const [tlf,    setTlf]    = useState('');
  const [epost,  setEpost]  = useState('');
  const [errors, setErrors] = useState({});
  const [saving, setSaving] = useState(false);

  const validate = () => {
    const e = {};
    if (!navn.trim())                          e.navn  = t('ob_err_name');
    if (!/^\+?[\d\s]{8,}$/.test(tlf.trim()))  e.tlf   = t('ob_err_phone');
    if (!/\S+@\S+\.\S+/.test(epost.trim()))   e.epost = t('ob_err_email');
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const handleSubmit = () => {
    if (!validate()) return;
    setSaving(true);
    setTimeout(() => {
      onComplete({ navn: navn.trim(), tlf: tlf.trim(), epost: epost.trim() });
    }, 900);
  };

  const inputStyle = err => ({
    width:"100%", padding:"15px 16px",
    background:"#111", border:`1px solid ${err ? "rgba(220,60,60,0.6)" : "rgba(212,175,55,0.22)"}`,
    borderRadius:12, color:"#fff", fontSize:15,
    WebkitAppearance:"none", appearance:"none",
    transition:"border-color 0.2s"
  });
  const labelStyle = { color:"#888", fontSize:11, letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:6, display:"block" };
  const errStyle   = { color:"rgba(220,80,80,0.9)", fontSize:12, marginTop:5 };

  return (
    <div className="anim-fade-in" style={{ background:"#0D0D0D", minHeight:"100vh", display:"flex", flexDirection:"column" }}>

      {/* Decorative gold top bar */}
      <div style={{ height:3, background:"linear-gradient(90deg,#9A7D22,#F0D060,#D4AF37,#9A7D22)" }} />
      <div style={{ display:"flex", justifyContent:"flex-end", padding:"12px 20px 0" }}>
        <LangToggle />
      </div>

      {/* Hero section */}
      <div style={{ padding:"48px 28px 32px", textAlign:"center" }}>
        <div className="anim-gold-shimmer" style={{ fontSize:44, lineHeight:1, marginBottom:16 }}>👑</div>
        <h1 className="gold-text-gradient" style={{ fontSize:30, fontWeight:900, letterSpacing:"0.1em", margin:"0 0 8px" }}>
          DISHY
        </h1>
        <div style={{ width:40, height:1, background:"#D4AF37", margin:"0 auto 18px", opacity:0.6 }} />
        <p style={{ color:"#ccc", fontSize:16, fontWeight:600, margin:"0 0 8px" }}>
          {t('ob_welcome')[0]}<br/>{t('ob_welcome')[1]}
        </p>
        <p style={{ color:"#555", fontSize:13, lineHeight:1.6, margin:0 }}>
          {t('ob_subtitle').split('\n').map((line,i) => <span key={i}>{line}{i===0&&<br/>}</span>)}
        </p>
      </div>

      {step === 1 && (
        <div className="anim-fade-in" style={{ flex:1, padding:"0 24px 48px", display:"flex", flexDirection:"column" }}>
          {/* Feature list */}
          <div style={{ marginBottom:36, display:"flex", flexDirection:"column", gap:14 }}>
            {t('ob_features').map(([icon, text]) => (
              <div key={text} style={{ display:"flex", alignItems:"center", gap:14 }}>
                <div style={{
                  width:38, height:38, flexShrink:0, borderRadius:10,
                  background:"rgba(212,175,55,0.08)", border:"1px solid rgba(212,175,55,0.2)",
                  display:"flex", alignItems:"center", justifyContent:"center", fontSize:18
                }}>{icon}</div>
                <p style={{ color:"#bbb", fontSize:14, margin:0, lineHeight:1.4 }}>{text}</p>
              </div>
            ))}
          </div>

          <div style={{ marginTop:"auto" }}>
            <button onClick={() => setStep(2)} className="anim-pulse-gold" style={{
              width:"100%", padding:"17px",
              background:"#D4AF37", border:"none", borderRadius:14, cursor:"pointer",
              fontSize:16, fontWeight:800, color:"#0D0D0D", letterSpacing:"0.04em"
            }}>
              {t('ob_cta')}
            </button>
            <p style={{ color:"#333", fontSize:11, textAlign:"center", margin:"12px 0 0", lineHeight:1.5 }}>
              {t('ob_terms')}
            </p>
          </div>
        </div>
      )}

      {step === 2 && (
        <div className="anim-fade-in" style={{ flex:1, padding:"0 24px 48px", overflowY:"auto", WebkitOverflowScrolling:"touch" }}>
          <div style={{ marginBottom:28 }}>
            <h2 style={{ color:"#fff", fontSize:22, fontWeight:700, margin:"0 0 6px" }}>{t('ob_form_title')}</h2>
            <p style={{ color:"#555", fontSize:14, margin:0 }}>{t('ob_form_subtitle')}</p>
          </div>

          {/* Navn */}
          <div style={{ marginBottom:18 }}>
            <label style={labelStyle}>{t('ob_name_label')}</label>
            <input
              type="text" placeholder={t('ob_name_ph')}
              value={navn} onChange={e => { setNavn(e.target.value); setErrors(p => ({...p,navn:undefined})); }}
              style={inputStyle(errors.navn)}
            />
            {errors.navn && <p style={errStyle}>{errors.navn}</p>}
          </div>

          {/* Telefon */}
          <div style={{ marginBottom:18 }}>
            <label style={labelStyle}>{t('ob_phone_label')}</label>
            <input
              type="tel" placeholder={t('ob_phone_ph')}
              value={tlf} onChange={e => { setTlf(e.target.value); setErrors(p => ({...p,tlf:undefined})); }}
              style={inputStyle(errors.tlf)}
            />
            {errors.tlf && <p style={errStyle}>{errors.tlf}</p>}
          </div>

          {/* E-post */}
          <div style={{ marginBottom:32 }}>
            <label style={labelStyle}>{t('ob_email_label')}</label>
            <input
              type="email" placeholder={t('ob_email_ph')}
              value={epost} onChange={e => { setEpost(e.target.value); setErrors(p => ({...p,epost:undefined})); }}
              style={inputStyle(errors.epost)}
            />
            {errors.epost && <p style={errStyle}>{errors.epost}</p>}
          </div>

          <button onClick={handleSubmit} disabled={saving} style={{
            width:"100%", padding:"17px",
            background: saving ? "rgba(212,175,55,0.5)" : "#D4AF37",
            border:"none", borderRadius:14, cursor: saving ? "default" : "pointer",
            fontSize:16, fontWeight:800, color:"#0D0D0D", letterSpacing:"0.04em",
            display:"flex", alignItems:"center", justifyContent:"center", gap:10
          }}>
            {saving ? (
              <>
                <div className="anim-spin" style={{ width:18, height:18, border:"2px solid #0D0D0D", borderTop:"2px solid transparent", borderRadius:"50%" }} />
                {t('ob_saving')}
              </>
            ) : t('ob_submit')}
          </button>

          <button onClick={() => setStep(1)} style={{
            width:"100%", padding:"13px", marginTop:10,
            background:"transparent", border:"none", cursor:"pointer",
            fontSize:13, color:"#444"
          }}>{t('ob_back')}</button>
        </div>
      )}
    </div>
  );
};

/* ═══════════════════════════ APP ═══════════════════════════ */

const App = () => {
  const [lang, setLang] = useState(() => localStorage.getItem('dishy_lang') || 'no');
  const [userPos,   setUserPos]   = useState(null);
  const [geoStatus, setGeoStatus] = useState('pending'); // 'pending' | 'ok' | 'denied'

  useEffect(() => { localStorage.setItem('dishy_lang', lang); }, [lang]);

  useEffect(() => {
    if (!navigator.geolocation) { setGeoStatus('denied'); return; }
    navigator.geolocation.getCurrentPosition(
      pos => { setUserPos({ lat: pos.coords.latitude, lng: pos.coords.longitude }); setGeoStatus('ok'); },
      ()  => setGeoStatus('denied'),
      { enableHighAccuracy: false, timeout: 8000, maximumAge: 60000 }
    );
  }, []);

  const [user,               setUser]               = useState(() => {
    try { return JSON.parse(localStorage.getItem('dishy_user')) || null; } catch { return null; }
  });
  const [navTab,             setNavTab]             = useState('explore');
  const [profileTab,         setProfileTab]         = useState('coupons');
  const [screen,             setScreen]             = useState('discover');
  const [selectedRestaurant, setSelectedRestaurant] = useState(null);
  const [selectedDish,       setSelectedDish]       = useState(null);
  const [uploadedDishes,     setUploadedDishes]     = useState(new Set());
  const [bookmarkedDishes,   setBookmarkedDishes]   = useState(new Set());
  const [coupons,            setCoupons]            = useState([
    { id:1, dishName:"Østers naturell", restaurantName:"Køl Bar & Bistro", used:false }
  ]);
  const [showCoupon,         setShowCoupon]         = useState(false);
  const [totalPoints,        setTotalPoints]        = useState(0);
  const [showToast,          setShowToast]          = useState(false);

  const [capturedImage,  setCapturedImage]  = useState(null);
  const [showImageModal, setShowImageModal] = useState(false);

  const fileInputRef = useRef(null);

  const openFilePicker = () => {
    if (fileInputRef.current) {
      fileInputRef.current.value = '';
      fileInputRef.current.click();
    }
  };

  // Restaurants with uploaded state + live distance merged in
  const restaurantsWithState = RESTAURANTS.map(r => {
    const distMeters = userPos ? haversine(userPos.lat, userPos.lng, r.coords.lat, r.coords.lng) : null;
    const distance = distMeters !== null
      ? formatDist(distMeters, lang)
      : geoStatus === 'pending'
        ? (lang === 'en' ? 'Locating…' : 'Henter posisjon…')
        : (lang === 'en' ? 'Molde centre' : 'Molde sentrum');
    return {
      ...r,
      distance,
      menu: Object.fromEntries(
        Object.entries(r.menu).map(([cat, dishes]) => [
          cat,
          dishes.map(d => ({ ...d, uploaded: uploadedDishes.has(d.id) }))
        ])
      )
    };
  });

  const currentRestaurant = selectedRestaurant
    ? restaurantsWithState.find(r => r.id === selectedRestaurant.id)
    : null;

  /* ── Handlers ── */

  const handleSelectRestaurant = r => { setSelectedRestaurant(r); setScreen('restaurant'); };

  const handleBack = () => {
    setScreen('discover');
    setSelectedDish(null);
    setShowCoupon(false);
    setShowImageModal(false);
    setCapturedImage(null);
  };

  const handleSelectDish = dish => {
    const enriched = { ...dish, uploaded: uploadedDishes.has(dish.id) };
    setSelectedDish(enriched);
  };

  const handleCloseDish = () => setSelectedDish(null);

  const handleUploadClick = () => openFilePicker();

  const handleFileSelected = async e => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async ev => {
      const resized = await resizeImage(ev.target.result);
      const [, base64] = resized.split(',');
      setCapturedImage({ preview: resized, base64, mime: 'image/jpeg' });
      setShowImageModal(true);
    };
    reader.readAsDataURL(file);
  };

  const handleRetake = () => {
    setShowImageModal(false);
    setCapturedImage(null);
    setTimeout(openFilePicker, 120);
  };

  const handleApproved = () => {
    setShowImageModal(false);
    setCapturedImage(null);
    if (selectedDish) {
      setUploadedDishes(prev => new Set([...prev, selectedDish.id]));
      setSelectedDish(prev => ({ ...prev, uploaded: true }));
      setCoupons(prev => [...prev, {
        id: Date.now(),
        dishName: selectedDish.name,
        restaurantName: selectedRestaurant?.name,
        used: false
      }]);
    }
    setTimeout(() => setShowCoupon(true), 350);
  };

  const handleUseCouponFromProfile = couponId => {
    setCoupons(prev => prev.map(c => c.id === couponId ? { ...c, used:true } : c));
    setTotalPoints(p => p + 100);
    setShowToast(true);
    setTimeout(() => setShowToast(false), 3200);
  };

  const handleCloseImageModal = () => {
    setShowImageModal(false);
    setCapturedImage(null);
  };

  const handleUseCoupon = () => {
    setShowCoupon(false);
    setCoupons(prev => {
      const idx = prev.map(c=>c.used).lastIndexOf(false);
      return prev.map((c,i) => i===idx ? {...c,used:true} : c);
    });
    setSelectedDish(null);
    setTotalPoints(p => p + 100);
    setShowToast(true);
    setTimeout(() => setShowToast(false), 3200);
  };

  const handleCloseCoupon = () => {
    setShowCoupon(false);
    setSelectedDish(null);
  };

  // Flatten bookmarked dishes across all restaurants for profile
  const savedDishes = [];
  restaurantsWithState.forEach(r => {
    Object.values(r.menu).forEach(dishes => {
      dishes.forEach(d => {
        if (bookmarkedDishes.has(d.id)) savedDishes.push({ ...d, restaurantName: r.name });
      });
    });
  });

  const handleRegister = userData => {
    localStorage.setItem('dishy_user', JSON.stringify(userData));
    setUser(userData);
  };

  const showNavBar = !showImageModal && !showCoupon;

  if (!user) {
    return (
      <LangContext.Provider value={{ lang, setLang }}>
        <div style={{ background:"#0D0D0D", minHeight:"100vh", maxWidth:430, margin:"0 auto" }}>
          <OnboardingScreen onComplete={handleRegister} />
        </div>
      </LangContext.Provider>
    );
  }

  return (
    <LangContext.Provider value={{ lang, setLang }}>
    <div style={{ background:"#0D0D0D", minHeight:"100vh", maxWidth:430, margin:"0 auto", position:"relative", overflow:"hidden" }}>

      {/* Hidden file input */}
      <input
        type="file"
        ref={fileInputRef}
        accept="image/*"
        style={{ display:"none" }}
        onChange={handleFileSelected}
      />

      {/* Points badge — above navbar */}
      {totalPoints > 0 && !showImageModal && navTab === 'explore' && (
        <div style={{
          position:"fixed", bottom:80, right:16, zIndex:90,
          background:"rgba(212,175,55,0.12)", border:"1px solid rgba(212,175,55,0.35)",
          borderRadius:20, padding:"6px 13px",
          display:"flex", alignItems:"center", gap:5,
          pointerEvents:"none"
        }}>
          <span style={{ color:"#D4AF37", fontSize:12 }}>✦</span>
          <span style={{ color:"#D4AF37", fontSize:12, fontWeight:700 }}>{totalPoints} poeng</span>
        </div>
      )}

      {/* Explore tab */}
      {navTab === 'explore' && (
        <>
          {screen === 'discover' && (
            <DiscoverScreen
              restaurants={restaurantsWithState}
              onSelect={handleSelectRestaurant}
              geoStatus={geoStatus}
            />
          )}
          {screen === 'restaurant' && currentRestaurant && !showImageModal && (
            <RestaurantScreen
              restaurant={currentRestaurant}
              onBack={handleBack}
              onSelectDish={handleSelectDish}
            />
          )}
        </>
      )}

      {/* Profile tab */}
      {navTab === 'profile' && (
        <ProfileScreen
          user={user}
          uploadCount={uploadedDishes.size + 1}
          coupons={coupons}
          onUseCoupon={handleUseCouponFromProfile}
          savedDishes={savedDishes}
          profileTab={profileTab}
          setProfileTab={setProfileTab}
        />
      )}

      {/* Dish modal — shown on top of any tab */}
      {selectedDish && !showCoupon && !showImageModal && (
        <DishModal
          dish={selectedDish}
          restaurantName={selectedRestaurant?.name}
          onClose={handleCloseDish}
          onUploadClick={handleUploadClick}
        />
      )}

      {/* Image upload + AI validation modal */}
      {showImageModal && capturedImage && (
        <ImageUploadModal
          dish={selectedDish}
          restaurantName={selectedRestaurant?.name}
          imageData={capturedImage}
          onRetake={handleRetake}
          onApproved={handleApproved}
          onClose={handleCloseImageModal}
        />
      )}

      {/* Gold coupon */}
      {showCoupon && selectedDish && (
        <CouponModal
          dish={selectedDish}
          points={totalPoints}
          onUse={handleUseCoupon}
          onClose={handleCloseCoupon}
        />
      )}

      {/* Bottom nav */}
      {showNavBar && (
        <BottomNav activeTab={navTab} onTabChange={setNavTab} />
      )}

      {/* Points toast */}
      <PointsToast points={totalPoints} visible={showToast} />
    </div>
    </LangContext.Provider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
