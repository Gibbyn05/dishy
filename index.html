const resizeImage = (dataUrl, maxPx = 1280) => new Promise(resolve => {
  const img = new Image();
  img.onload = () => {
    let { width: w, height: h } = img;
    if (w > maxPx || h > maxPx) {
      if (w >= h) { h = Math.round(h * maxPx / w); w = maxPx; }
      else        { w = Math.round(w * maxPx / h); h = maxPx; }
    }
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    c.getContext('2d').drawImage(img, 0, 0, w, h);
    resolve(c.toDataURL('image/jpeg', 0.82));
  };
  img.src = dataUrl;
});

const analyzeImage = async (base64, mime) => {
  const res = await fetch('/api/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ base64, mime })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    if (res.status === 429) throw new Error('For mange forespørsler – vent litt og prøv igjen');
    if (res.status === 503) throw new Error('AI-tjenesten er ikke tilgjengelig akkurat nå');
    throw new Error(err.error || `Feil (${res.status})`);
  }

  return await res.json();
};

          <div style={{ margin:"0 auto 20px", width:"75%", height:1, background:"linear-gradient(90deg,transparent,#D4AF37,transparent)", opacity:0.45 }} />

          <div style={{
            background:"rgba(212,175,55,0.06)", border:"1px dashed rgba(212,175,55,0.4)",
            borderRadius:14, padding:"16px", marginBottom:20, textAlign:"center"
          }}>
            <p style={{ color:"#666", fontSize:11, letterSpacing:"0.12em", textTransform:"uppercase", margin:"0 0 8px" }}>Din fordel</p>
            <p style={{ color:"#fff", fontSize:15, fontWeight:600, lineHeight:1.55, margin:0 }}>
              Vis denne skjermen i baren for en<br />
              <span style={{ color:"#D4AF37", fontWeight:800 }}>gratis valgfri mineralvann eller brus</span><br />
              fra restauranten.
            </p>
          </div>

          <div style={{
            display:"flex", alignItems:"center", justifyContent:"center", gap:8,
            background:"rgba(212,175,55,0.07)", borderRadius:10, padding:"10px 16px",
            marginBottom:24, border:"1px solid rgba(212,175,55,0.12)"
          }}>
            <span style={{ color:"#D4AF37", fontSize:16 }}>✦</span>
            <span style={{ color:"#D4AF37", fontSize:13, fontWeight:700 }}>+100 poeng etter bruk</span>
            <span style={{ color:"#333", fontSize:12 }}>·</span>
            <span style={{ color:"#666", fontSize:12 }}>Totalt: {points + 100}</span>
          </div>

          {!showConfirm ? (
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              <button onClick={() => setShowConfirm(true)} className="anim-pulse-gold" style={{
                width:"100%", padding:"15px",
                background:"#D4AF37", border:"none", borderRadius:13, cursor:"pointer",
                fontSize:14, fontWeight:800, color:"#0D0D0D", letterSpacing:"0.05em"
              }}>
                Bruk kupong
              </button>
              <button onClick={onClose} style={{
                width:"100%", padding:"12px",
                background:"transparent", border:"1px solid #2a2a2a", borderRadius:13, cursor:"pointer",
                fontSize:13, color:"#555"
              }}>
                Lukk — bruk senere
              </button>
            </div>
          ) : (
            <div style={{
              background:"rgba(212,175,55,0.07)", border:"1px solid rgba(212,175,55,0.25)",
              borderRadius:14, padding:"16px"
            }}>
              <p style={{ color:"#fff", fontSize:14, textAlign:"center", margin:"0 0 8px", fontWeight:700 }}>
                Er du sikker?
              </p>
              <p style={{ color:"#666", fontSize:12, textAlign:"center", margin:"0 0 16px", lineHeight:1.55 }}>
                Vis denne bekreftelsen til servitøren.<br />
                Kupongen kan kun brukes én gang.
              </p>
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={() => setShowConfirm(false)} style={{
                  flex:1, padding:"12px",
                  background:"transparent", border:"1px solid #333", borderRadius:11, cursor:"pointer",
                  fontSize:13, color:"#666"
                }}>
                  Avbryt
                </button>
                <button onClick={onUse} style={{
                  flex:2, padding:"12px",
                  background:"#D4AF37", border:"none", borderRadius:11, cursor:"pointer",
                  fontSize:13, fontWeight:800, color:"#0D0D0D"
                }}>
                  ✓ Bekreft bruk
                </button>
              </div>
            </div>
          )}
        </div>
        <div style={{ height:4, background:"linear-gradient(90deg,#9A7D22,#F0D060,#D4AF37,#9A7D22)" }} />
      </div>
    </div>
  );
};

/* ═══════════════════════════ POINTS TOAST ═══════════════════════════ */

const PointsToast = ({ points, visible }) => (
  <div style={{
    position:"fixed", top:20, left:"50%", transform:"translateX(-50%)",
    zIndex:600,
    background:"#1A1A1A", border:"1px solid #D4AF37",
    borderRadius:30, padding:"10px 20px",
    display:"flex", alignItems:"center", gap:8,
    opacity: visible ? 1 : 0,
    transition:"opacity 0.4s ease",
    pointerEvents:"none",
    boxShadow:"0 4px 30px rgba(212,175,55,0.3)"
  }}>
    <span style={{ color:"#D4AF37", fontSize:15 }}>✦</span>
    <span style={{ color:"#fff", fontSize:13, fontWeight:700 }}>+100 poeng opptjent!</span>
    <span style={{ color:"#666", fontSize:12 }}>Totalt: {points}</span>
  </div>
);

/* ═══════════════════════════ APP ═══════════════════════════ */

const App = () => {
  const [screen,             setScreen]             = useState('discover');
  const [selectedRestaurant, setSelectedRestaurant] = useState(null);
  const [selectedDish,       setSelectedDish]       = useState(null);
  const [uploadedDishes,     setUploadedDishes]     = useState(new Set());
  const [showCoupon,         setShowCoupon]         = useState(false);
  const [totalPoints,        setTotalPoints]        = useState(0);
  const [showToast,          setShowToast]          = useState(false);

  const [capturedImage,  setCapturedImage]  = useState(null);
  const [showImageModal, setShowImageModal] = useState(false);

  const fileInputRef = useRef(null);

  const openFilePicker = () => {
    if (fileInputRef.current) {
      fileInputRef.current.value = '';
      fileInputRef.current.click();
    }
  };

  // Restaurants with uploaded state merged in
  const restaurantsWithState = RESTAURANTS.map(r => ({
    ...r,
    menu: Object.fromEntries(
      Object.entries(r.menu).map(([cat, dishes]) => [
        cat,
        dishes.map(d => ({ ...d, uploaded: uploadedDishes.has(d.id) }))
      ])
    )
  }));

  const currentRestaurant = selectedRestaurant
    ? restaurantsWithState.find(r => r.id === selectedRestaurant.id)
    : null;

  /* ── Handlers ── */

  const handleSelectRestaurant = r => { setSelectedRestaurant(r); setScreen('restaurant'); };

  const handleBack = () => {
    setScreen('discover');
    setSelectedDish(null);
    setShowCoupon(false);
    setShowImageModal(false);
    setCapturedImage(null);
  };

  const handleSelectDish = dish => {
    const enriched = { ...dish, uploaded: uploadedDishes.has(dish.id) };
    setSelectedDish(enriched);
  };

  const handleCloseDish = () => setSelectedDish(null);

  const handleUploadClick = () => openFilePicker();

  const handleFileSelected = async e => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async ev => {
      const resized = await resizeImage(ev.target.result);
      const [, base64] = resized.split(',');
      setCapturedImage({ preview: resized, base64, mime: 'image/jpeg' });
      setShowImageModal(true);
    };
    reader.readAsDataURL(file);
  };

  const handleRetake = () => {
    setShowImageModal(false);
    setCapturedImage(null);
    setTimeout(openFilePicker, 120);
  };

  const handleApproved = () => {
    setShowImageModal(false);
    setCapturedImage(null);
    if (selectedDish) {
      setUploadedDishes(prev => new Set([...prev, selectedDish.id]));
      setSelectedDish(prev => ({ ...prev, uploaded: true }));
    }
    setTimeout(() => setShowCoupon(true), 350);
  };

  const handleCloseImageModal = () => {
    setShowImageModal(false);
    setCapturedImage(null);
  };

  const handleUseCoupon = () => {
    setShowCoupon(false);
    setSelectedDish(null);
    const newPts = totalPoints + 100;
    setTotalPoints(newPts);
    setShowToast(true);
    setTimeout(() => setShowToast(false), 3200);
  };

  const handleCloseCoupon = () => {
    setShowCoupon(false);
    setSelectedDish(null);
  };

  return (
    <div style={{ background:"#0D0D0D", minHeight:"100vh", maxWidth:430, margin:"0 auto", position:"relative", overflow:"hidden" }}>

      {/* Hidden file input — no capture attribute so user can choose camera OR gallery */}
      <input
        type="file"
        ref={fileInputRef}
        accept="image/*"
        style={{ display:"none" }}
        onChange={handleFileSelected}
      />

      {/* Points badge */}
      {totalPoints > 0 && (
        <div style={{
          position:"fixed", bottom:24, right:16, zIndex:90,
          background:"rgba(212,175,55,0.12)", border:"1px solid rgba(212,175,55,0.35)",
          borderRadius:20, padding:"6px 13px",
          display:"flex", alignItems:"center", gap:5,
          pointerEvents:"none"
        }}>
          <span style={{ color:"#D4AF37", fontSize:12 }}>✦</span>
          <span style={{ color:"#D4AF37", fontSize:12, fontWeight:700 }}>{totalPoints} poeng</span>
        </div>
      )}

      {/* Screens */}
      {screen === 'discover' && (
        <DiscoverScreen
          restaurants={restaurantsWithState}
          onSelect={handleSelectRestaurant}
        />
      )}
      {screen === 'restaurant' && currentRestaurant && !showImageModal && (
        <RestaurantScreen
          restaurant={currentRestaurant}
          onBack={handleBack}
          onSelectDish={handleSelectDish}
        />
      )}

      {/* Dish modal */}
      {selectedDish && !showCoupon && !showImageModal && (
        <DishModal
          dish={selectedDish}
          restaurantName={selectedRestaurant?.name}
          onClose={handleCloseDish}
          onUploadClick={handleUploadClick}
        />
      )}

      {/* Image upload + AI validation modal */}
      {showImageModal && capturedImage && (
        <ImageUploadModal
          dish={selectedDish}
          restaurantName={selectedRestaurant?.name}
          imageData={capturedImage}
          onRetake={handleRetake}
          onApproved={handleApproved}
          onClose={handleCloseImageModal}
        />
      )}

      {/* Gold coupon */}
      {showCoupon && selectedDish && (
        <CouponModal
          dish={selectedDish}
          points={totalPoints}
          onUse={handleUseCoupon}
          onClose={handleCloseCoupon}
        />
      )}

      {/* Points toast */}
      <PointsToast points={totalPoints} visible={showToast} />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
