/* ─────────────────────────── STARS ─────────────────────────── */

const Stars = ({ rating = 5, small = false }) => {
  const full  = Math.floor(rating);
  const half  = rating % 1 >= 0.5;
  const empty = 5 - full - (half ? 1 : 0);
  const size  = small ? "text-xs" : "text-base";
  return (
    <span className={`${size} tracking-tight`}>
      {"★".repeat(full)}
      {half ? "½" : ""}
      {"☆".repeat(empty)}
    </span>
  );
};

/* ─────────────────────────── POINTS TOAST ─────────────────────────── */

const PointsToast = ({ points, visible }) => (
  <div
    style={{
      position:"fixed", top:20, left:"50%",
      transform:"translateX(-50%)",
      zIndex:300,
      background:"#1A1A1A", border:"1px solid #D4AF37",

      display:"flex", alignItems:"center", gap:8,

      transition:"opacity 0.4s ease",

      boxShadow:"0 4px 30px rgba(212,175,55,0.25)"
    }}
  >
    <span style={{ color:"#D4AF37", fontSize:16 }}>✦</span>
    <span style={{ color:"#fff", fontSize:13, fontWeight:700 }}>+100 poeng opptjent!</span>
    <span style={{ color:"#888", fontSize:12 }}>Totalt: {points}</span>
  </div>
);

/* ─────────────────────────── APP ─────────────────────────── */

const App = () => {
  const [screen,             setScreen]             = useState("discover");
  const [selectedRestaurant, setSelectedRestaurant] = useState(null);
  const [selectedDish,       setSelectedDish]       = useState(null);
  const [uploadState,        setUploadState]        = useState("idle"); // idle | uploading | done
  const [showCoupon,         setShowCoupon]         = useState(false);
  const [uploadedDishes,     setUploadedDishes]     = useState(new Set());
  const [totalPoints,        setTotalPoints]        = useState(0);
  const [showToast,          setShowToast]          = useState(false);

  /* Deep-copied restaurant data with uploaded state merged in */
  const restaurantsWithState = RESTAURANTS.map(r => ({
    ...r,
    menu: Object.fromEntries(
      Object.entries(r.menu).map(([cat, dishes]) => [
        cat,
        dishes.map(d => ({ ...d, uploaded: uploadedDishes.has(d.id) }))
      ])
    )
  }));

  const handleSelectRestaurant = (r) => {
    setSelectedRestaurant(r);
    setScreen("restaurant");
  };

  const handleBack = () => {
    setScreen("discover");
    setSelectedDish(null);
    setUploadState("idle");
    setShowCoupon(false);
  };

  const handleSelectDish = (dish) => {
    setSelectedDish({ ...dish, uploaded: uploadedDishes.has(dish.id) });
    setUploadState("idle");
  };

  const handleCloseDish = () => {
    setSelectedDish(null);
    setUploadState("idle");
  };

  const handleUpload = () => {
    setUploadState("uploading");
    setTimeout(() => {
      setUploadState("done");
      if (selectedDish) {
        setUploadedDishes(prev => new Set([...prev, selectedDish.id]));
        setSelectedDish(prev => ({ ...prev, uploaded: true }));
      }
      setTimeout(() => {
        setShowCoupon(true);
      }, 400);
    }, 1500);
  };

  const handleUseCoupon = () => {
    setShowCoupon(false);
    setSelectedDish(null);
    setUploadState("idle");
    const newPoints = totalPoints + 100;
    setTotalPoints(newPoints);
    setShowToast(true);
    setTimeout(() => setShowToast(false), 3000);
  };

  const handleCloseCoupon = () => {
    setShowCoupon(false);
    setSelectedDish(null);
    setUploadState("idle");
  };

  /* Resolve restaurant with updated state */
  const currentRestaurant = selectedRestaurant
    ? restaurantsWithState.find(r => r.id === selectedRestaurant.id)
    : null;

  return (
    <div style={{
      background:"#0D0D0D",
      minHeight:"100vh",
      maxWidth:430,
      margin:"0 auto",
      position:"relative",
      overflow:"hidden"
    }}>
      {/* Points indicator (always visible) */}
      {totalPoints > 0 && (
        <div style={{
          position:"fixed", top:14, right:16, zIndex:90,
          background:"rgba(212,175,55,0.12)",
          border:"1px solid rgba(212,175,55,0.35)",
          borderRadius:20, padding:"5px 12px",
          display:"flex", alignItems:"center", gap:5
        }}>
          <span style={{ color:"#D4AF37", fontSize:11 }}>✦</span>
          <span style={{ color:"#D4AF37", fontSize:12, fontWeight:700 }}>{totalPoints} p</span>
        </div>
      )}

      {/* Screen 1 */}
      {screen === "discover" && (
        <DiscoverScreen
          restaurants={restaurantsWithState}
          onSelect={handleSelectRestaurant}
        />
      )}

      {/* Screen 2 */}
      {screen === "restaurant" && currentRestaurant && (
        <RestaurantScreen
          restaurant={currentRestaurant}
          onBack={handleBack}
          onSelectDish={handleSelectDish}
        />
      )}

      {/* Dish modal (Screen 3) */}
      {selectedDish && !showCoupon && (
        <DishModal
          dish={selectedDish}
          restaurantName={selectedRestaurant?.name}
          onClose={handleCloseDish}
          onUpload={handleUpload}
          uploadState={uploadState}
        />
      )}

      {/* Gold coupon modal */}
      {showCoupon && selectedDish && (
        <CouponModal
          dish={selectedDish}
          points={totalPoints}
          onUse={handleUseCoupon}
          onClose={handleCloseCoupon}
        />
      )}

      {/* Points toast */}
      <PointsToast points={totalPoints} visible={showToast} />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
